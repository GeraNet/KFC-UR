<!DOCTYPE html>
<html lang="uk">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UR KFC Network</title>

<style>

/* ================= BASE ================= */

body{
margin:0;
background:#0a0b0f;
color:#fff;
font-family:system-ui,Arial;
overflow-x:hidden;
padding-bottom:100px;
}

/* ================= HEADER ================= */

.topbar{
background:rgba(10,11,15,0.9);
backdrop-filter:blur(14px);
border-bottom:1px solid #1f1f1f;
padding:16px 0;
text-align:center;
position:sticky;
top:0;
z-index:999;

animation:slideDown 0.6s ease-out;
}

.logo-wrap{
display:flex;
justify-content:center;
align-items:center;
padding:8px 0;
}

.logo-wrap img{
width:clamp(110px, 16vw, 210px);
height:auto;
max-width:100%;
display:block;
object-fit:contain;

filter:drop-shadow(0 6px 10px rgba(0,0,0,0.35));

animation:logoAppear 0.8s ease-out, logoFloat 4s ease-in-out infinite;
}

/* ================= HERO ================= */

.hero{
padding:70px 20px;
text-align:center;
}

.hero h1{
font-size:40px;
font-weight:900;
}

.hero p{
opacity:0.7;
margin-top:10px;
}

.hero button{
margin-top:20px;
padding:14px 18px;
border:none;
border-radius:12px;
background:#e4002b;
color:#fff;
font-weight:800;
cursor:pointer;
transition:0.2s;
}

.hero button:hover{
transform:translateY(-3px);
}

/* ================= SECTIONS ================= */

section{
margin:14px;
padding:18px;
background:#12141a;
border:1px solid #1f2430;
border-radius:14px;

animation:fadeUp 0.6s ease-out;
}

h2{
border-left:4px solid #e4002b;
padding-left:10px;
font-size:18px;
}

/* ================= MENU ================= */

#menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
margin-top:10px;
}

.card{
background:#141722;
border:1px solid #232838;
padding:12px;
border-radius:12px;
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
border-color:#e4002b;
}

.card h3{
font-size:14px;
}

.card p{
color:#ff2a4d;
font-weight:800;
}

.card button{
width:100%;
margin-top:8px;
padding:10px;
border:none;
border-radius:10px;
background:#e4002b;
color:#fff;
}

/* ================= CART ================= */

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #2a2f3a;
background:#0f1116;
color:#fff;
}

.cart button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
background:#e4002b;
color:#fff;
font-weight:800;
}

/* ================= NAV ================= */

nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
padding:10px;
background:rgba(10,11,15,0.9);
backdrop-filter:blur(12px);
border-top:1px solid #1f1f1f;
}

nav button{
background:none;
border:none;
font-size:22px;
color:#fff;
}

/* ================= ANIMATIONS ================= */

@keyframes slideDown{
from{transform:translateY(-20px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

@keyframes logoAppear{
from{opacity:0;transform:scale(0.85);}
to{opacity:1;transform:scale(1);}
}

@keyframes logoFloat{
0%{transform:translateY(0px);}
50%{transform:translateY(-4px);}
100%{transform:translateY(0px);}
}

/* ================= MOBILE ================= */

@media(max-width:768px){
.hero h1{font-size:28px;}
}

</style>

</head>

<body>

<!-- ================= HEADER ================= -->
<header class="topbar">

  <div class="logo-wrap">
    <img src="https://i.ibb.co/MD1VrkyL/21-D7-C5-C8-C791-44-C2-94-CF-F23-E9-AB40786.png" alt="UR KFC Logo">
  </div>

</header>

<!-- ================= HERO ================= -->
<section class="hero">

<h1>
Смачна курка.<br>
Велика мережа.
</h1>

<p>
UR KFC — ресторанна мережа Ukraine RP
</p>

<button onclick="scrollToMenu()">
🍔 Переглянути меню
</button>

</section>

<!-- ================= ABOUT ================= -->
<section>
<h2>🍗 Про UR KFC</h2>

<p>
UR KFC — це сучасна ресторанна мережа у світі Ukraine RP.
Ми створюємо атмосферу справжнього закладу та сервісу.
</p>

</section>

<!-- ================= MENU BUTTONS ================= -->
<section>
<h2>🍔 Меню</h2>

<button onclick="openCat('burgers')">Бургери</button>
<button onclick="openCat('chicken')">Курка</button>
<button onclick="openCat('garnish')">Гарніри</button>
<button onclick="openCat('drinks')">Напої</button>
<button onclick="openCat('combo')">Комбо</button>

</section>

<!-- ================= SEARCH ================= -->
<input id="search" placeholder="🔎 Пошук страви" oninput="searchFood()">

<!-- ================= MENU ================= -->
<section id="menu"></section>

<!-- ================= CART ================= -->
<section class="cart">

<h2>🛒 Корзина</h2>

<div id="cart">Порожньо</div>

<p>Їжа: <span id="food">0</span> грн</p>

<input id="tips" type="number" placeholder="Чайові" oninput="update()">

<h2>Разом: <span id="total">0</span> грн</h2>

<button onclick="order()">Замовити через Telegram</button>

</section>

<!-- ================= NAV ================= -->
<nav>
<button onclick="scrollToMenu()">🍔</button>
<button onclick="scrollCart()">🛒</button>
<button onclick="scrollLocation()">📍</button>
</nav>

<script src="script.js"></script>

</body>
</html>
